<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Eerder verschenen columns</title>

<style>

body{
background:black;
color:white;
font-family:Arial,Helvetica,sans-serif;
margin:0;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 40px;
}

.logo{
font-size:36px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:18px;
}

.content{
max-width:900px;
margin:auto;
padding:60px;
}

.column-link{
color:white;
text-decoration:none;
font-size:24px;
}

.column-link:hover{
text-decoration:underline;
}

</style>
</head>
</div>

<script>

const zoekveld = document.getElementById("zoekveld");

zoekveld.addEventListener("keyup", function() {

let filter = zoekveld.value.toLowerCase();

let items = document.querySelectorAll(".column-item");

items.forEach(item => {

let tekst = item.textContent.toLowerCase();

if (tekst.includes(filter)) {
item.style.display = "";
}
else {
item.style.display = "none";
}

});

});

</script>
<body>

<header>

<div class="logo">
Ger den Reijer
</div>

<nav>
<a href="index.html">Home</a>
<a href="columns.html">Columns</a>
<a href="contact.html">Contact</a>
</nav>

</header>

  <input
type="text"
id="zoekveld"
placeholder="🔍 Zoek een column..."
style="
width:100%;
padding:12px;
font-size:18px;
margin-bottom:40px;
background:#111;
color:white;
border:1px solid #444;
">

<div id="columnlijst">


<p>
Alle eerder verschenen columns.
<div class="column-item">
<p>
<a class="column-link"
href="columns/columns/inktvis-in-de-gemeenteraad.html">
Inktvis in de gemeenteraad?
</a>

</div>

</div>

</body>
</html>
